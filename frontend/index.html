<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Görüntü Sahteciliği Tespit Sistemi</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f8fa; color: #111; }
    h1 { margin-bottom: 8px; }
    .card { background: #fff; padding: 16px; border-radius: 10px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
    input[type="file"] { background: #fff; padding: 6px; border: 1px solid #ddd; border-radius: 6px; }
    button { background: #2563eb; color: white; border: 0; border-radius: 6px; padding: 8px 14px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    pre { background: #0b1020; color: #e2e8f0; padding: 12px; border-radius: 8px; overflow: auto; }
    .hint { color: #444; font-size: 14px; }
    .status-badge { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 13px; font-weight: 600; }
    .status-ok { background: #dcfce7; color: #166534; }
    .status-warn { background: #fef3c7; color: #92400e; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; margin-top: 10px; }
    .summary-item { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; background: #fafafa; }
    .summary-label { font-size: 12px; color: #555; margin-bottom: 4px; }
    .summary-value { font-size: 15px; font-weight: 600; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .pill-ok { background: #dcfce7; color: #166534; }
    .pill-risk { background: #fee2e2; color: #991b1b; }
    .section-title { margin: 10px 0 6px; font-size: 14px; color: #222; }
    .summary-note { margin-top: 10px; padding: 10px; border-radius: 8px; background: #eef2ff; color: #1e3a8a; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Görüntü Sahteciliği Tespit Sistemi</h1>
  <p class="hint">Bu arayüzden API endpointlerini doğrudan test edebilirsin.</p>

  <section class="card">
    <h3>Görsel Yükleme</h3>
    <div class="row">
      <input id="uploadImage" type="file" accept=".jpg,.jpeg,.png,.gif,.webp" />
      <button onclick="uploadImage()">Yükle</button>
    </div>
  </section>

  <section class="card">
    <h3>Klasik Analiz (ORB + AKAZE + SIFT)</h3>
    <div class="row">
      <input id="classicalRef" type="file" accept=".jpg,.jpeg,.png,.gif,.webp" />
      <input id="classicalTest" type="file" accept=".jpg,.jpeg,.png,.gif,.webp" />
      <button onclick="runClassical()">Analizi Başlat</button>
    </div>
  </section>

  <section class="card">
    <h3>AI Analiz</h3>
    <div id="modelStatusBadge" class="status-badge status-warn">Model durumu: kontrol edilmedi</div>
    <div class="row">
      <input id="aiImage" type="file" accept=".jpg,.jpeg,.png,.gif,.webp" />
      <button onclick="runAi()">AI Analizi Başlat</button>
      <button onclick="checkAiModel()">Model Durumunu Kontrol Et</button>
    </div>
  </section>

  <section class="card">
    <h3>Analiz Geçmişi (PostgreSQL)</h3>
    <div class="row">
      <button onclick="loadHistory()">Geçmişi Getir</button>
    </div>
  </section>

  <section class="card">
    <h3>Özet Sonuç</h3>
    <div id="summaryArea" class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">Durum</div>
        <div class="summary-value">Henüz işlem yapılmadı</div>
      </div>
    </div>
  </section>

  <section class="card">
    <h3>Ham JSON Sonuç</h3>
    <pre id="resultArea">Henüz işlem yapılmadı.</pre>
  </section>

  <script>
    const resultArea = document.getElementById("resultArea");
    const summaryArea = document.getElementById("summaryArea");

    function showResult(data) {
      resultArea.textContent = JSON.stringify(data, null, 2);
      renderSummary(data);
    }

    function showError(error) {
      resultArea.textContent = `Hata: ${error}`;
      summaryArea.innerHTML = `
        <div class="summary-item">
          <div class="summary-label">Hata</div>
          <div class="summary-value">${error}</div>
        </div>
      `;
    }

    function decisionPill(decision) {
      if (!decision) return "<span class=\"pill\">-</span>";
      const isRisk = decision === "suspicious";
      const cls = isRisk ? "pill pill-risk" : "pill pill-ok";
      const text = isRisk ? "Şüpheli" : "Orijinale Yakın";
      return `<span class="${cls}">${text}</span>`;
    }

    function renderSummary(data) {
      if (data.message && data.filename && data.size_bytes) {
        summaryArea.innerHTML = `
          <div class="summary-item"><div class="summary-label">İşlem</div><div class="summary-value">Yükleme</div></div>
          <div class="summary-item"><div class="summary-label">Dosya</div><div class="summary-value">${data.filename}</div></div>
          <div class="summary-item"><div class="summary-label">Boyut</div><div class="summary-value">${data.size_bytes} byte</div></div>
          <div class="summary-item"><div class="summary-label">Tip</div><div class="summary-value">${data.content_type || "-"}</div></div>
        `;
        return;
      }

      if (data.results && Array.isArray(data.results)) {
        const cards = data.results.map(item => `
          <div class="summary-item">
            <div class="summary-label">${item.algorithm}</div>
            <div class="summary-value">${decisionPill(item.decision)}</div>
            <div class="section-title">Benzerlik Skoru: ${item.similarity_score}</div>
          </div>
        `).join("");
        const note = data.summary?.explanation
          ? `<div class="summary-note">${data.summary.explanation}</div>`
          : "";
        summaryArea.innerHTML = cards + note;
        return;
      }

      if (data.ensemble && data.models) {
        const modelItems = data.models.map(item => `
          <div class="summary-item">
            <div class="summary-label">${item.model}</div>
            <div class="summary-value">${decisionPill(item.decision)}</div>
            <div class="section-title">Sahte Olasılığı: ${item.fake_probability}</div>
          </div>
        `).join("");
        summaryArea.innerHTML = `
          <div class="summary-item">
            <div class="summary-label">AI Ensemble</div>
            <div class="summary-value">${decisionPill(data.ensemble.decision)}</div>
            <div class="section-title">Sahte Olasılığı: ${data.ensemble.fake_probability}</div>
          </div>
          ${modelItems}
          ${data.ensemble.explanation ? `<div class="summary-note">${data.ensemble.explanation}</div>` : ""}
        `;
        return;
      }

      if (typeof data.count === "number" && Array.isArray(data.items)) {
        summaryArea.innerHTML = `
          <div class="summary-item"><div class="summary-label">Toplam Kayıt</div><div class="summary-value">${data.count}</div></div>
          <div class="summary-item"><div class="summary-label">Durum</div><div class="summary-value">${data.count > 0 ? "Kayıtlar bulundu" : "Kayıt yok"}</div></div>
        `;
        return;
      }

      summaryArea.innerHTML = `
        <div class="summary-item">
          <div class="summary-label">Bilgi</div>
          <div class="summary-value">Sonuç alındı</div>
        </div>
      `;
    }

    async function uploadImage() {
      const image = document.getElementById("uploadImage").files[0];
      if (!image) return showError("Lütfen bir dosya seç.");
      const form = new FormData();
      form.append("file", image);
      try {
        const res = await fetch("/api/upload", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Yükleme başarısız.");
        showResult(data);
      } catch (e) {
        showError(e.message);
      }
    }

    async function runClassical() {
      const reference = document.getElementById("classicalRef").files[0];
      const test = document.getElementById("classicalTest").files[0];
      if (!reference || !test) return showError("Lütfen iki görsel de seç.");
      const form = new FormData();
      form.append("reference_image", reference);
      form.append("test_image", test);
      try {
        const res = await fetch("/api/analyze/classical", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Klasik analiz başarısız.");
        showResult(data);
      } catch (e) {
        showError(e.message);
      }
    }

    async function runAi() {
      const image = document.getElementById("aiImage").files[0];
      if (!image) return showError("Lütfen bir görsel seç.");
      const form = new FormData();
      form.append("image", image);
      try {
        const res = await fetch("/api/analyze/ai", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "AI analiz başarısız.");
        showResult(data);
      } catch (e) {
        showError(e.message);
      }
    }

    async function checkAiModel() {
      try {
        const res = await fetch("/api/ai/model-status");
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Model durumu alınamadı.");
        updateModelBadge(data);
        showResult(data);
      } catch (e) {
        showError(e.message);
      }
    }

    function updateModelBadge(data) {
      const badge = document.getElementById("modelStatusBadge");
      if (data.onnx_model_found) {
        badge.className = "status-badge status-ok";
        badge.textContent = "Model durumu: ONNX model bulundu (onnx+proxy)";
        return;
      }

      badge.className = "status-badge status-warn";
      badge.textContent = "Model durumu: ONNX bulunamadı (proxy-only)";
    }

    async function loadHistory() {
      try {
        const res = await fetch("/api/analysis/history?limit=20");
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Geçmiş alınamadı.");
        showResult(data);
      } catch (e) {
        showError(e.message);
      }
    }

    checkAiModel();
  </script>
</body>
</html>
